apiVersion: v2
name: ims
description: A Helm chart for the Incident Management System (IMS)
type: application
version: 0.1.0
appVersion: "1.0.0"

# Enterprise-grade: We do NOT write our own database manifests.
# We use battle-tested Bitnami charts as dependencies.
dependencies:
  - name: postgresql
    version: 12.1.6
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.11.3
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: mongodb
    version: 13.1.5
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
