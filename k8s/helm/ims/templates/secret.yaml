apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ims.fullname" . }}-secret
  labels:
    app.kubernetes.io/name: {{ include "ims.name" . }}
    helm.sh/chart: {{ include "ims.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
# In a real production environment, you would use ExternalSecrets or SealedSecrets instead of raw base64.
# For this Helm chart, we require the user to pass these via --set or external values files.
data:
  JWT_SECRET: {{ required "A valid JWT_SECRET is required!" .Values.backend.env.JWT_SECRET | b64enc | quote }}
  ADMIN_PASSWORD: {{ required "A valid ADMIN_PASSWORD is required!" .Values.backend.env.ADMIN_PASSWORD | b64enc | quote }}
  VIEWER_PASSWORD: {{ required "A valid VIEWER_PASSWORD is required!" .Values.backend.env.VIEWER_PASSWORD | b64enc | quote }}
  # Optional integrations
  {{- if .Values.backend.env.SLACK_WEBHOOK_URL }}
  SLACK_WEBHOOK_URL: {{ .Values.backend.env.SLACK_WEBHOOK_URL | b64enc | quote }}
  {{- end }}
  {{- if .Values.backend.env.GEMINI_API_KEY }}
  GEMINI_API_KEY: {{ .Values.backend.env.GEMINI_API_KEY | b64enc | quote }}
  {{- end }}
