apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ims.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "ims.name" . }}
    helm.sh/chart: {{ include "ims.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  ENVIRONMENT: {{ .Values.backend.env.ENVIRONMENT | quote }}
  APP_NAME: {{ .Values.backend.env.APP_NAME | quote }}
  FRONTEND_HOT_RELOAD: {{ .Values.backend.env.FRONTEND_HOT_RELOAD | quote }}
  # Constructing internal URLs to reach the dependency subcharts
  POSTGRES_URL: "postgresql+asyncpg://postgres:{{ .Values.postgresql.auth.postgresPassword }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  MONGO_URL: "mongodb://root:{{ .Values.mongodb.auth.rootPassword }}@{{ .Release.Name }}-mongodb:27017/{{ .Values.mongodb.auth.database }}?authSource=admin"
  REDIS_URL: "redis://{{ .Release.Name }}-redis-master:6379"
