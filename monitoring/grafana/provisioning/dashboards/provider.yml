apiVersion: 1

providers:
  - name: 'IMS Dashboards'
    orgId: 1
    folder: 'Incident Management'
    folderUid: 'ims_dashboards'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
